name: Code Quality

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r docgen/requirements-dev.txt

    - name: Format check with Black
      run: |
        black docgen --check || true

    - name: Import sorting check with isort
      run: |
        isort docgen --check-only --diff || true

    - name: Lint with pylint
      run: |
        pylint docgen --disable=fixme --max-line-length=100 || true

    - name: Security check with bandit
      run: |
        bandit -r docgen -c .bandit || true

    - name: Generate report
      if: always()
      run: |
        mkdir -p docgen/quality-reports
        black docgen --check --verbose > docgen/quality-reports/black.txt 2>&1 || true
        isort docgen --check-only --diff > docgen/quality-reports/isort.txt 2>&1 || true

    - name: Upload quality reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: code-quality-reports
        path: docgen/quality-reports/
        retention-days: 30
